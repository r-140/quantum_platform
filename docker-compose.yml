# Local infrastructure for the quantum platform: RabbitMQ (task queue) and
# Postgres (experiment metadata). Kafka/TimescaleDB/MinIO will be added
# here as the project grows into them -- see docs/architecture/deferred-work.md.
#
# Run with: docker compose up -d
# RabbitMQ management UI: http://localhost:15672 (guest/guest)

services:
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: quantum-platform-rabbitmq
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16
    container_name: quantum-platform-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: quantum
      POSTGRES_PASSWORD: quantum
      POSTGRES_DB: quantum_platform
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quantum"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  rabbitmq-data:
  postgres-data: