# Local infrastructure for the quantum platform. Currently just RabbitMQ --
# Postgres/TimescaleDB/MinIO/Kafka will be added here as the project grows
# into them (see docs/architecture/orchestration.md for the current plan).
#
# Run with: docker compose up -d
# Management UI: http://localhost:15672 (guest/guest)

services:
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: quantum-platform-rabbitmq
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  rabbitmq-data: