# Local infrastructure for the quantum platform: RabbitMQ (task queue) and
# Postgres (experiment metadata). Kafka/TimescaleDB/MinIO will be added
# here as the project grows into them -- see docs/architecture/deferred-work.md.
#
# Run with: docker compose up -d
# RabbitMQ management UI: http://localhost:15672 (guest/guest)

services:
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: quantum-platform-rabbitmq
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16
    container_name: quantum-platform-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: quantum
      POSTGRES_PASSWORD: quantum
      POSTGRES_DB: quantum_platform
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quantum"]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: quantum-platform-kafka
    ports:
      - "9092:9092"
    environment:
      # KRaft mode (no Zookeeper): this single container acts as both
      # broker and controller -- the modern, simpler way to run Kafka for
      # local development (Zookeeper-based setups are legacy as of
      # Kafka 3.x+/Confluent Platform 7.5+).
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # Replication factor 1 everywhere -- single-broker dev setup, not
      # meant to survive broker loss. Production would use >=3.
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      # A fixed, valid KRaft cluster ID -- any base64-encoded 16-byte UUID
      # works; this specific value is the widely-used example ID from
      # Confluent's own KRaft documentation/tutorials, reused here purely
      # for convenience (nothing about it is secret or environment-specific).
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: quantum-platform-timescaledb
    ports:
      - "5433:5432"    # 5433, not 5432 -- avoids colliding with the plain
                        # `postgres` service above (experiment metadata,
                        # unrelated database) on the same host.
    environment:
      POSTGRES_USER: quantum
      POSTGRES_PASSWORD: quantum
      POSTGRES_DB: telemetry
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
      # Anything in docker-entrypoint-initdb.d/ runs automatically on
      # first container init (empty data dir only) -- this is what
      # creates the calibration_events hypertable, no Alembic-style
      # migration tool needed for a single append-only table.
      - ./services/stream-analytics/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quantum"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  rabbitmq-data:
  postgres-data:
  kafka-data:
  timescaledb-data: