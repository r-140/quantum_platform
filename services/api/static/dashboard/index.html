<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quantum Platform · Experiments</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0B0E14;
    --panel: #12161F;
    --panel-hover: #171C28;
    --border: #232A38;
    --text: #E4E7EC;
    --text-muted: #7B8494;
    --accent: #4FD1E8;
    --accent-dim: #2A6B78;
    --queued: #E8B44F;
    --completed: #4FE8A0;
    --failed: #E85F5F;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .mono {
    font-family: 'JetBrains Mono', monospace;
  }

  /* ---------- header ---------- */

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 28px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    gap: 16px;
  }

  .title-block {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }

  .title-block h1 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.02em;
    margin: 0;
  }

  .title-block .subtitle {
    color: var(--text-muted);
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
  }

  .stats-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .stat-pill {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 6px 12px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 5px;
    font-size: 12.5px;
    font-family: 'JetBrains Mono', monospace;
  }

  .stat-pill .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
  }

  .stat-pill .algo {
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-size: 10.5px;
  }

  /* ---------- controls ---------- */

  .controls {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 16px 28px;
    flex-wrap: wrap;
  }

  select, input[type="text"] {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    padding: 7px 10px;
    border-radius: 5px;
    outline: none;
  }

  select:focus, input[type="text"]:focus {
    border-color: var(--accent);
  }

  input[type="text"] {
    width: 220px;
  }

  input[type="text"]::placeholder {
    color: var(--text-muted);
  }

  .sort-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 7px 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    cursor: pointer;
    color: var(--text-muted);
    user-select: none;
  }

  .sort-toggle:hover { color: var(--text); }
  .sort-toggle .arrow { color: var(--accent); }

  .refresh-indicator {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 12px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }

  .refresh-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse-slow 2s ease-in-out infinite;
  }

  @keyframes pulse-slow {
    0%, 100% { opacity: 0.35; }
    50% { opacity: 1; }
  }

  /* ---------- table ---------- */

  .table-wrap {
    padding: 0 28px 28px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }

  thead th {
    text-align: left;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    font-weight: 500;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }

  tbody tr {
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.12s ease;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--panel-hover); }

  tbody td {
    padding: 12px 16px;
    font-size: 13px;
    vertical-align: middle;
  }

  .algo-tag {
    display: inline-block;
    padding: 3px 9px;
    border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px;
    font-weight: 500;
    letter-spacing: 0.02em;
  }

  .algo-grover { background: rgba(79, 209, 232, 0.12); color: #4FD1E8; }
  .algo-sat_grover { background: rgba(155, 140, 232, 0.12); color: #9B8CE8; }
  .algo-qpe { background: rgba(232, 180, 79, 0.12); color: #E8B44F; }
  .algo-vqe { background: rgba(232, 95, 155, 0.12); color: #E85F9B; }

  .status-cell {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .status-queued .status-dot { background: var(--queued); animation: pulse-slow 1.4s ease-in-out infinite; }
  .status-completed .status-dot { background: var(--completed); }
  .status-failed .status-dot { background: var(--failed); }

  .status-queued { color: var(--queued); }
  .status-completed { color: var(--completed); }
  .status-failed { color: var(--failed); }

  .id-cell {
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-muted);
    font-size: 12px;
  }

  .time-cell {
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-muted);
    font-size: 12px;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }

  /* ---------- detail panel ---------- */

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s ease;
    z-index: 10;
  }

  .overlay.open {
    opacity: 1;
    pointer-events: auto;
  }

  .detail-panel {
    position: fixed;
    top: 0;
    right: 0;
    bottom: 0;
    width: 460px;
    max-width: 92vw;
    background: var(--panel);
    border-left: 1px solid var(--border);
    transform: translateX(100%);
    transition: transform 0.18s ease;
    z-index: 11;
    display: flex;
    flex-direction: column;
  }

  .detail-panel.open {
    transform: translateX(0);
  }

  .detail-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .detail-header .algo-tag { margin-bottom: 8px; }

  .detail-id {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
    word-break: break-all;
  }

  .close-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 20px;
    cursor: pointer;
    line-height: 1;
    padding: 4px;
  }

  .close-btn:hover { color: var(--text); }

  .detail-body {
    padding: 20px 24px;
    overflow-y: auto;
    flex: 1;
  }

  .detail-row {
    display: flex;
    justify-content: space-between;
    padding: 9px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }

  .detail-row .label {
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .detail-row .value {
    font-family: 'JetBrains Mono', monospace;
    text-align: right;
  }

  .detail-section-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    margin: 20px 0 10px;
  }

  pre.result-json {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    line-height: 1.6;
    overflow-x: auto;
    white-space: pre-wrap;
    word-break: break-word;
    color: var(--text);
    margin: 0;
  }

  .error-text {
    background: rgba(232, 95, 95, 0.08);
    border: 1px solid rgba(232, 95, 95, 0.3);
    color: var(--failed);
    border-radius: 5px;
    padding: 12px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
    line-height: 1.5;
  }
</style>
</head>
<body>

<header>
  <div class="title-block">
    <h1>QUANTUM PLATFORM</h1>
    <span class="subtitle">/ experiments</span>
  </div>
  <div class="stats-row" id="statsRow"></div>
</header>

<div class="controls">
  <select id="filterAlgorithm">
    <option value="">all algorithms</option>
    <option value="grover">grover</option>
    <option value="sat_grover">sat_grover</option>
    <option value="qpe">qpe</option>
    <option value="vqe">vqe</option>
  </select>
  <select id="filterStatus">
    <option value="">all statuses</option>
    <option value="queued">queued</option>
    <option value="completed">completed</option>
    <option value="failed">failed</option>
  </select>
  <input type="text" id="searchId" placeholder="search by id...">
  <div class="sort-toggle" id="sortToggle">
    <span>submitted</span>
    <span class="arrow" id="sortArrow">↓</span>
  </div>
  <div class="refresh-indicator">
    <span class="refresh-dot"></span>
    <span id="lastUpdated">live</span>
  </div>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>Algorithm</th>
        <th>Status</th>
        <th>Submitted</th>
        <th>Duration</th>
        <th>ID</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
  <div class="empty-state" id="emptyState" style="display:none;">no experiments match the current filters</div>
</div>

<div class="overlay" id="overlay"></div>
<div class="detail-panel" id="detailPanel">
  <div class="detail-header">
    <div>
      <div class="algo-tag" id="detailAlgoTag"></div>
      <div class="detail-id" id="detailId"></div>
    </div>
    <button class="close-btn" id="closeBtn">&times;</button>
  </div>
  <div class="detail-body" id="detailBody"></div>
</div>

<script>
const API_BASE = '';  // same-origin -- dashboard is served by the same FastAPI process it queries
const REFRESH_INTERVAL_MS = 3000;

const state = {
  algorithm: '',
  status: '',
  sort: 'desc',
  search: '',
  experiments: [],
};

const ALGO_LABELS = { grover: 'grover', sat_grover: 'sat grover', qpe: 'qpe', vqe: 'vqe' };
const STATUS_LABELS = { queued: 'queued', completed: 'completed', failed: 'failed' };

function fmtTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleTimeString('en-GB', { hour12: false }) + '.' + String(d.getMilliseconds()).padStart(3, '0');
}

function fmtDuration(submittedAt, completedAt) {
  if (!completedAt) return '—';
  const seconds = (new Date(completedAt) - new Date(submittedAt)) / 1000;
  return seconds.toFixed(2) + 's';
}

function shortId(id) {
  return id.slice(0, 8) + '…' + id.slice(-4);
}

async function fetchStats() {
  const res = await fetch(`${API_BASE}/experiments/stats`);
  if (!res.ok) throw new Error(`stats fetch failed: ${res.status}`);
  return res.json();
}

async function fetchExperiments() {
  const params = new URLSearchParams();
  if (state.algorithm) params.set('algorithm', state.algorithm);
  if (state.status) params.set('status', state.status);
  params.set('sort', state.sort);
  const res = await fetch(`${API_BASE}/experiments?${params.toString()}`);
  if (!res.ok) throw new Error(`experiments fetch failed: ${res.status}`);
  return res.json();
}

function renderStats(stats) {
  const totals = {};
  for (const s of stats) {
    totals[s.status] = (totals[s.status] || 0) + s.count;
  }
  const total = Object.values(totals).reduce((a, b) => a + b, 0);

  const dotColor = { queued: 'var(--queued)', completed: 'var(--completed)', failed: 'var(--failed)' };
  const pills = [`<div class="stat-pill"><span class="algo">total</span><span class="mono">${total}</span></div>`];
  for (const status of ['queued', 'completed', 'failed']) {
    if (!totals[status]) continue;
    pills.push(`
      <div class="stat-pill">
        <span class="dot" style="background:${dotColor[status]}"></span>
        <span>${status}</span>
        <span class="mono">${totals[status]}</span>
      </div>
    `);
  }
  document.getElementById('statsRow').innerHTML = pills.join('');
}

function matchesSearch(exp) {
  if (!state.search) return true;
  return exp.id.toLowerCase().includes(state.search.toLowerCase());
}

function renderTable() {
  const rows = state.experiments.filter(matchesSearch);
  const tbody = document.getElementById('tableBody');
  const emptyState = document.getElementById('emptyState');

  if (rows.length === 0) {
    tbody.innerHTML = '';
    emptyState.style.display = 'block';
    return;
  }
  emptyState.style.display = 'none';

  tbody.innerHTML = rows.map(exp => `
    <tr data-id="${exp.id}">
      <td><span class="algo-tag algo-${exp.algorithm}">${ALGO_LABELS[exp.algorithm] || exp.algorithm}</span></td>
      <td>
        <div class="status-cell status-${exp.status}">
          <span class="status-dot"></span>
          <span>${STATUS_LABELS[exp.status] || exp.status}</span>
        </div>
      </td>
      <td class="time-cell">${fmtTime(exp.submitted_at)}</td>
      <td class="time-cell">${fmtDuration(exp.submitted_at, exp.completed_at)}</td>
      <td class="id-cell">${shortId(exp.id)}</td>
    </tr>
  `).join('');

  tbody.querySelectorAll('tr').forEach(tr => {
    tr.addEventListener('click', () => openDetail(tr.dataset.id));
  });
}

function openDetail(id) {
  const exp = state.experiments.find(e => e.id === id);
  if (!exp) return;

  document.getElementById('detailAlgoTag').outerHTML =
    `<div class="algo-tag algo-${exp.algorithm}" id="detailAlgoTag">${ALGO_LABELS[exp.algorithm] || exp.algorithm}</div>`;
  document.getElementById('detailId').textContent = exp.id;

  let body = `
    <div class="detail-row"><span class="label">status</span><span class="value status-${exp.status}">${exp.status}</span></div>
    <div class="detail-row"><span class="label">submitted_at</span><span class="value">${exp.submitted_at}</span></div>
    <div class="detail-row"><span class="label">completed_at</span><span class="value">${exp.completed_at || '—'}</span></div>
    <div class="detail-row"><span class="label">duration</span><span class="value">${fmtDuration(exp.submitted_at, exp.completed_at)}</span></div>
  `;

  if (exp.result) {
    body += `<div class="detail-section-title">result</div><pre class="result-json">${JSON.stringify(exp.result, null, 2)}</pre>`;
  }
  if (exp.error) {
    body += `<div class="detail-section-title">error</div><div class="error-text">${exp.error}</div>`;
  }

  document.getElementById('detailBody').innerHTML = body;
  document.getElementById('overlay').classList.add('open');
  document.getElementById('detailPanel').classList.add('open');
}

function closeDetail() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('detailPanel').classList.remove('open');
}

document.getElementById('overlay').addEventListener('click', closeDetail);
document.getElementById('closeBtn').addEventListener('click', closeDetail);
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });

document.getElementById('filterAlgorithm').addEventListener('change', e => {
  state.algorithm = e.target.value;
  refresh();
});
document.getElementById('filterStatus').addEventListener('change', e => {
  state.status = e.target.value;
  refresh();
});
document.getElementById('searchId').addEventListener('input', e => {
  state.search = e.target.value;
  renderTable();
});
document.getElementById('sortToggle').addEventListener('click', () => {
  state.sort = state.sort === 'desc' ? 'asc' : 'desc';
  document.getElementById('sortArrow').textContent = state.sort === 'desc' ? '↓' : '↑';
  refresh();
});

async function refresh() {
  try {
    const [stats, experiments] = await Promise.all([fetchStats(), fetchExperiments()]);
    renderStats(stats);
    state.experiments = experiments;
    renderTable();
    document.getElementById('lastUpdated').textContent =
      'updated ' + new Date().toLocaleTimeString('en-GB', { hour12: false });
  } catch (err) {
    document.getElementById('lastUpdated').textContent = 'connection error';
    console.error(err);
  }
}

refresh();
setInterval(refresh, REFRESH_INTERVAL_MS);
</script>

</body>
</html>
